name: Production Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend critical tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend critical tests
        run: python -m pytest tests/test_auth.py tests/test_delivery_v2_units.py tests/test_delivery_v2.py tests/test_migrations.py tests/test_health.py -q

      - name: Run local provider quality smoke
        run: python scripts/provider_quality_smoke.py --provider local --spec-only --min-score 0.65

  postgres-migration:
    name: PostgreSQL migration smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ai_pjm
          POSTGRES_PASSWORD: ai_pjm_test
          POSTGRES_DB: ai_pjm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_pjm -d ai_pjm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Upgrade PostgreSQL database to head
        run: python scripts/migrate.py upgrade head --database-url "postgresql+asyncpg://ai_pjm:ai_pjm_test@127.0.0.1:5432/ai_pjm_test"

      - name: Show current migration revision
        run: python scripts/migrate.py current --database-url "postgresql+asyncpg://ai_pjm:ai_pjm_test@127.0.0.1:5432/ai_pjm_test"

  compose:
    name: Production compose config
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate default production compose config
        run: docker compose --env-file docker-compose.production.env.example -f docker-compose.production.yml config --quiet

      - name: Validate worker profile production compose config
        run: docker compose --env-file docker-compose.production.env.example -f docker-compose.production.yml --profile workers config --quiet

  frontend:
    name: Frontend audit, tests, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production and dev dependencies
        run: npm audit --audit-level=high

      - name: Run frontend regression tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build
